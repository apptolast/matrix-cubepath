apiVersion: v1
kind: ServiceAccount
metadata:
  name: matrix-cubepath
  namespace: matrix-cubepath
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: matrix-cubepath-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - nodes
      - namespaces
      - events
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources:
      - ingressroutes
      - middlewares
      - tlsstores
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - clusterissuers
      - issuers
      - certificaterequests
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources:
      - volumes
      - replicas
      - engines
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metallb.io"]
    resources:
      - ipaddresspools
      - l2advertisements
      - bgpadvertisements
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: matrix-cubepath-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: matrix-cubepath-reader
subjects:
  - kind: ServiceAccount
    name: matrix-cubepath
    namespace: matrix-cubepath
